    <h2>見どころ</h2>
    <p>
      <!-- 銀色に輝く巨大球体の外観が目を引く名古屋市科学館は、ギネス世界記録にも認定された世界最大級のプラネタリウムドーム「Brother Earth」を擁する総合科学館です。マイナス30度の極寒世界や高さ9メートルの人工竜巻を体感できる大型ラボをはじめ、五感をフルに使って科学の魅力と不思議を楽しく学べます。>
    </p>
